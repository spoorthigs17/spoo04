<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - VetCart</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=2" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a href="{{ url_for('home') }}" class="logo">VetCart</a>
    </div>
    <nav class="main-nav">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('cart') }}">Cart (<span id="cartCount">0</span>)</a>
      <a href="{{ url_for('payment') }}">Payment</a>
    </nav>
  </header>

  <section class="products-section">
    <div class="section-header">
      <h2>All Products</h2>
      <p>Browse our veterinary product catalog and add items to your cart.</p>
    </div>
    <div id="productGrid" class="product-grid"></div>
  </section>

  <footer class="site-footer">
    <p>© 2026 VetCart Veterinary Store. All Rights Reserved.</p>
  </footer>

  <script defer src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</body>
</html>
